problem:
  hyp:
    alpha: 1
    clip: 1
    epochs: 150
    lr: 0.001
    lr_decay: step
    lr_factor: 0.1
    lr_schedule:
    - 60
    - 100
    lr_throttle: false
    optimizer: adam
    save_period: -1
    test_batch_size: 500
    test_mode: default
    train_batch_size: 100
    train_mode: progressive
    val_period: 20
    warmup_period: 10
  model:
    model: dt_net_recall_1d
    model_path: ./outputs/mazes_ablation/training-rusty-Tayla
    width: 400
    max_iters: 30
    test_iterations:
      low: 30
      high: 50
  name: prefix_sums
  test_data: 512
  train_data: 32
name: testing_default
quick_test: false
run_id: unsought-Narada
